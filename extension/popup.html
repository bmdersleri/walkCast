<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>walkCast</title>
  <link rel="stylesheet" href="./popup.css" />
</head>
<body>
  <main>
    <header>
      <h1>walkCast</h1>
      <p>Save and manage your queue</p>
    </header>

    <section class="row">
      <input id="apiBase" type="text" value="http://127.0.0.1:8000/api/v1" />
      <button id="saveConfig" class="icon-btn" title="Save API base" aria-label="Save API base">✓</button>
    </section>

    <section class="row row-actions">
      <button id="saveActive" class="icon-btn" title="Save active tab" aria-label="Save active tab">＋</button>
      <button id="refresh" class="icon-btn" title="Refresh list" aria-label="Refresh list">↻</button>
    </section>

    <section id="list"></section>
  </main>

  <script src="./popup.js" type="module"></script>
</body>
</html>
