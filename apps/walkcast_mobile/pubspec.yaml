name: walkcast_mobile
description: "walkCast native mobile app (Flutter)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.9.0
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  path_provider: ^2.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  url_launcher: ^6.3.2
  fluttertoast: ^8.2.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
